<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بيانات التأمين - Bcare</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:#f5f5f5; direction:rtl; padding:20px;
    }
    .container{
      max-width:500px; margin:0 auto; background:#fff; border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.08); padding:30px;
    }
    .logo{ text-align:center; margin-bottom:40px }
    .logo-container{ display:flex; align-items:center; justify-content:center; gap:10px }
    .logo-circle{
      width:50px; height:50px; background:#2c3e50; border-radius:50%;
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:24px; font-weight:bold;
    }
    .logo-text{ color:#2c3e50; font-size:28px; font-weight:600 }
    .logo-underline{ width:60px; height:4px; background:#f39c12; margin:10px auto 0; border-radius:2px }
    .form-title{ text-align:center; color:#2c3e50; font-size:24px; font-weight:600; margin-bottom:30px }
    .form-group{ margin-bottom:20px }
    .form-label{ display:block; color:#666; font-size:16px; margin-bottom:8px; text-align:right }
    .form-control, .form-select, .date-input{
      width:100%; padding:12px 16px; border:1px solid #ddd; border-radius:8px; font-size:16px;
      background:#f8f9fa; transition:border-color .3s; text-align:right; direction:rtl;
    }
    .form-control:focus, .form-select:focus, .date-input:focus{ outline:none; border-color:#3498db; background:#fff }
    .select-wrapper{ position:relative }
    .select-wrapper::after{
      content:"🔽"; position:absolute; left:15px; top:50%; transform:translateY(-50%);
      pointer-events:none; color:#3498db;
    }
    .radio-group{ display:flex; gap:30px; justify-content:center; margin-top:10px }
    .radio-option{ display:flex; align-items:center; gap:8px; cursor:pointer }
    .radio-input{ width:20px; height:20px; border:2px solid #ddd; border-radius:50%; appearance:none; cursor:pointer; position:relative; transition:border-color .3s }
    .radio-input:checked{ border-color:#3498db }
    .radio-input:checked::after{
      content:""; width:10px; height:10px; background:#3498db; border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    }
    .radio-label{ color:#666; font-size:16px; cursor:pointer }
    .submit-btn{
      width:100%; background:#f39c12; color:#fff; padding:15px; border:none; border-radius:8px;
      font-size:18px; font-weight:600; cursor:pointer; margin-top:30px; transition:background-color .3s
    }
    .submit-btn:hover{ background:#e67e22 }
    .note{ font-size:13px; color:#888; text-align:center; margin-top:10px }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-container">
        <div class="logo-text">Care</div>
        <div class="logo-circle">b</div>
      </div>
      <div class="logo-underline"></div>
    </div>

    <h2 class="form-title">بيانات التأمين</h2>

    <!-- لم يعد هناك action أو method: لا إرسال ولا حفظ -->
    <form id="vehicle-details-form" onsubmit="return false;">
      <!-- نوع التأمين (المطلوب الوحيد للتحويل) -->
      <div class="form-group">
        <label class="form-label">نوع التأمين</label>
        <div class="select-wrapper">
          <select id="insurance_type" class="form-select" required>
            <option value="">اختر</option>
            <option value="comprehensive">شامل</option>
            <option value="third-party">ضد الغير</option>
          </select>
        </div>
      </div>

      <!-- الحقول التالية اختيارية تمامًا ولن تُرسل أو تُحفظ -->
      <div class="form-group">
        <label class="form-label">تاريخ بدء التأمين</label>
        <input type="date" id="start_date" class="date-input" />
      </div>

      <div class="form-group">
        <label class="form-label">الغرض من استخدام المركبة</label>
        <div class="select-wrapper">
          <select id="vehicle_usage" class="form-select">
            <option value="">اختر</option>
            <option value="personal">شخصي</option>
            <option value="commercial">تجاري</option>
            <option value="rental">تأجير</option>
            <option value="passenger-transport">نقل الركاب او كريم - اوبر</option>
            <option value="goods-transport">نقل بضائع</option>
            <option value="petroleum-transport">نقل مشتقات نفطية</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">القيمة السوقية للمركبة</label>
        <input type="number" id="market_value" class="form-control" placeholder="أدخل القيمة" />
      </div>

      <div class="form-group">
        <label class="form-label">سنة صنع المركبة</label>
        <div class="select-wrapper">
          <select id="manufacture_year" class="form-select">
            <option value="">اختر السنة</option>
            <option>2025</option><option>2024</option><option>2023</option>
            <option>2022</option><option>2021</option><option>2020</option>
            <option>2019</option><option>2018</option><option>2017</option>
            <option>2016</option><option>2015</option><option>2014</option>
            <option>2013</option><option>2012</option><option>2011</option>
            <option>2010</option><option>2009</option><option>2008</option>
            <option>2007</option><option>2006</option><option>2005</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">مكان إصدار المركبة</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="issue_place" class="radio-input" value="agency" />
            <span class="radio-label">الوكالة</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="issue_place" class="radio-input" value="showroom" />
            <span class="radio-label">المعرض</span>
          </label>
        </div>
      </div>

      <button id="show-offers" type="button" class="submit-btn">إظهار العروض</button>
      <div class="note">لن يتم حفظ أي بيانات من هذه الصفحة.</div>
    </form>
  </div>

  <script>
    // تعبئة تاريخ اليوم بشكل افتراضي (اختياري)
    (function setToday(){
      const dateInput = document.getElementById('start_date');
      if (dateInput){
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
      }
    })();

    // التحويل حسب نوع التأمين فقط
    document.getElementById('show-offers').addEventListener('click', function(){
      const type = document.getElementById('insurance_type').value;
      if (!type){
        alert('يرجى اختيار نوع التأمين أولاً');
        return;
      }
      if (type === 'comprehensive'){
        window.location.href = 'shamel.html';
      } else if (type === 'third-party'){
        window.location.href = 'gher.html';
      }
    });
  </script>
</body>
</html>
